apiVersion: v1
kind: Service
metadata:
  name: ceiba-test-api
  namespace: ceiba-test
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
  labels:
    app: ceiba-test-api
spec:
  selector:
    app: ceiba-test-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      name: http
  type: LoadBalancer
