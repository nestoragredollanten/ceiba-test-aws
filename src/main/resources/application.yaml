spring:
  application:
    name: ceiba-test
  profiles:
    active: dynamodb

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

app:
  initial-balance: 500000

---
# Perfil: dynamodb (produccion)
spring:
  config:
    activate:
      on-profile: dynamodb

aws:
  region: us-east-1
  dynamodb:
    table:
      customer: customer_account_prod
      subscription: subscription_prod
      transaction: transaction_prod

---
# Perfil: test (ambiente local con tablas test)
spring:
  config:
    activate:
      on-profile: test

aws:
  region: us-east-1
  dynamodb:
    table:
      customer: customer_account_test
      subscription: subscription_test
      transaction: transaction_test
